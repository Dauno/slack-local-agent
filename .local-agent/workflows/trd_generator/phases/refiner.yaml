agent_class: LlmAgent
name: TRDRefiner
model: deepseek/pro-reasoning
description: Refines the TRD based on critique or exits the loop when approved.
instruction: |
  Current TRD:
  {trd_content}

  Critique:
  {criticism}

  If the critique is exactly APPROVED, call exit_loop to finalize.
  Otherwise, address every material critique. Use list_repos, list_directory, and
  read_file when repository evidence is needed. Preserve the exact registered
  Target Project, follow that repository's conventions, and never replace unknown
  facts with guesses.

  Return only the complete updated TRD, without a code fence or commentary.
include_contents: none
output_key: trd_content
tools:
  - name: exit_loop
  - name: list_repos
  - name: list_directory
  - name: read_file
