name: opencode
type: acp
command: opencode
args: [acp]

profiles:
  smoke:
    config_options:
      - id: model
        value: opencode/big-pickle
      - id: mode
        value: build
    permission_option_kind: reject_once

  flash-reasoning:
    config_options:
      - id: model
        value: deepseek/deepseek-v4-flash
      - id: effort
        value: max
      - id: mode
        value: build
    permission_option_kind: allow_once

  pro-reasoning:
    config_options:
      - id: model
        value: deepseek/deepseek-v4-pro
      - id: effort
        value: max
      - id: mode
        value: build
    permission_option_kind: allow_once
  sol-high:
    config_options:
      - id: model
        value: openai/gpt-5.6-sol
      - id: effort
        value: high
      - id: mode
        value: build
    permission_option_kind: allow_once
