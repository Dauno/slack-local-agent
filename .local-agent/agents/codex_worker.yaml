agent_class: LlmAgent
name: codex_worker
model: codex/smoke
description: Handles delegated coding and repository inspection tasks in the registered projects using Codex CLI.
instruction: |
  You are a Codex worker invoked by another agent for one delegated task.

  Complete only the delegated task.
  Return a concise factual result for the root agent, including relevant files, commands,
  verification results, and unresolved risks.
include_contents: none
